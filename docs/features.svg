<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b10"/>
      <stop offset="100%" style="stop-color:#0a0f14"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="cardCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="borderH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00E676;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="borderC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00C8FF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="borderP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="borderA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Section label -->
  <text x="600" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="600" text-anchor="middle" fill="rgba(107,114,128,0.8)" letter-spacing="2">
    RECURSOS DO PROJETO
  </text>

  <!-- ── Card 1: PWA / Offline ── -->
  <rect x="28" y="54" width="258" height="236" rx="14" fill="url(#cardGreen)" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.35"/>
  <rect x="28" y="54" width="258" height="2" rx="1" fill="url(#borderH)"/>
  <!-- Icon bg -->
  <circle cx="82" cy="107" r="28" fill="rgba(0, 230, 118,0.12)"/>
  <text x="82" y="116" font-size="28" text-anchor="middle">📱</text>
  <!-- Title -->
  <text x="157" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="700" fill="#69f0ae">PWA Instalável</text>
  <text x="157" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="rgba(107,114,128,0.9)">Progressive Web App</text>
  <!-- Features -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(209,213,219,0.85)">
    <text x="48" y="162">▸ Instala direto do browser</text>
    <text x="48" y="184">▸ Funciona 100% offline</text>
    <text x="48" y="206">▸ Cache versionado</text>
    <text x="48" y="228">▸ App shell + recursos</text>
    <text x="48" y="250">▸ iOS &amp; Android ready</text>
    <text x="48" y="272">▸ Ícones e manifest.json</text>
  </g>

  <!-- ── Card 2: Laboratório Interativo ── -->
  <rect x="310" y="54" width="258" height="236" rx="14" fill="url(#cardCyan)" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <rect x="310" y="54" width="258" height="2" rx="1" fill="url(#borderC)"/>
  <circle cx="364" cy="107" r="28" fill="rgba(0, 200, 255,0.12)"/>
  <text x="364" y="116" font-size="28" text-anchor="middle">🔬</text>
  <text x="439" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="700" fill="#00C8FF">Lab Interativo</text>
  <text x="439" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="rgba(107,114,128,0.9)">Ferramentas &amp; Quizzes</text>
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(209,213,219,0.85)">
    <text x="330" y="162">▸ Modelo anatômico interativo</text>
    <text x="330" y="184">▸ 7 sistemas do organismo</text>
    <text x="330" y="206">▸ Quizzes e simuladores</text>
    <text x="330" y="228">▸ Diário de peso/sintomas</text>
    <text x="330" y="250">▸ Calculadora de IMC/TMB</text>
    <text x="330" y="272">▸ Girar e tocar nos órgãos</text>
  </g>

  <!-- ── Card 3: Supabase Auth + Sync ── -->
  <rect x="592" y="54" width="258" height="236" rx="14" fill="url(#cardPurple)" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35"/>
  <rect x="592" y="54" width="258" height="2" rx="1" fill="url(#borderP)"/>
  <circle cx="646" cy="107" r="28" fill="rgba(139,92,246,0.12)"/>
  <text x="646" y="116" font-size="28" text-anchor="middle">☁️</text>
  <text x="721" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="700" fill="#a78bfa">Auth &amp; Nuvem</text>
  <text x="721" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="rgba(107,114,128,0.9)">Supabase + RLS</text>
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(209,213,219,0.85)">
    <text x="612" y="162">▸ Login / cadastro de usuário</text>
    <text x="612" y="184">▸ Página de login dedicada</text>
    <text x="612" y="206">▸ Recuperação de senha</text>
    <text x="612" y="228">▸ Sync entre dispositivos</text>
    <text x="612" y="250">▸ Row Level Security (RLS)</text>
    <text x="612" y="272">▸ Captura de leads</text>
  </g>

  <!-- ── Card 4: Design & UX ── -->
  <rect x="874" y="54" width="298" height="236" rx="14" fill="url(#cardAmber)" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.35"/>
  <rect x="874" y="54" width="298" height="2" rx="1" fill="url(#borderA)"/>
  <circle cx="932" cy="107" r="28" fill="rgba(245,158,11,0.12)"/>
  <text x="932" y="116" font-size="28" text-anchor="middle">✨</text>
  <text x="1013" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="700" fill="#fbbf24">Design Premium</text>
  <text x="1013" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="rgba(107,114,128,0.9)">Glassmorphic · Neon · Dark</text>
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(209,213,219,0.85)">
    <text x="894" y="162">▸ Tema holográfico neon</text>
    <text x="894" y="184">▸ Fontes Outfit + Inter</text>
    <text x="894" y="206">▸ 100% responsivo / mobile</text>
    <text x="894" y="228">▸ Animações CSS suaves</text>
    <text x="894" y="250">▸ Prefers-reduced-motion</text>
    <text x="894" y="272">▸ Glassmorphic cards</text>
  </g>

</svg>
