<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b10"/>
      <stop offset="100%" style="stop-color:#0a0f14"/>
    </linearGradient>
    <linearGradient id="topBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#10b981;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="180" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="1.5" fill="url(#topBorder)"/>

  <!-- Label -->
  <text x="600" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        font-weight="600" text-anchor="middle" fill="rgba(107,114,128,0.8)" letter-spacing="2">
    STACK TECNOLÓGICO
  </text>

  <!-- Tech items — 7 itens equidistantes -->

  <!-- HTML5 -->
  <g transform="translate(75,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(227,79,38,0.08)" stroke="#e34f26" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">🌐</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#f87171">HTML5</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Semântico</text>
  </g>

  <!-- CSS3 -->
  <g transform="translate(247,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(6,182,212,0.08)" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">🎨</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#06b6d4">CSS3</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Custom Props + Animações</text>
  </g>

  <!-- JavaScript -->
  <g transform="translate(419,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">⚡</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#fbbf24">JavaScript</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Vanilla ES Modules</text>
  </g>

  <!-- PWA / Service Worker -->
  <g transform="translate(600,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">📱</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#34d399">PWA</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Service Worker + Manifest</text>
  </g>

  <!-- Supabase -->
  <g transform="translate(781,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(62,207,142,0.08)" stroke="#3ecf8e" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">🗄️</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#3ecf8e">Supabase</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Auth + DB + RLS</text>
  </g>

  <!-- Stripe -->
  <g transform="translate(953,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(99,91,255,0.08)" stroke="#635bff" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">💳</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#a5b4fc">Stripe</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Payment Link (opcional)</text>
  </g>

  <!-- Vercel -->
  <g transform="translate(1125,55)">
    <circle cx="0" cy="30" r="34" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    <text x="0" y="40" font-size="30" text-anchor="middle">▲</text>
    <text x="0" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
          text-anchor="middle" fill="#e5e7eb">Vercel</text>
    <text x="0" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
          text-anchor="middle" fill="rgba(107,114,128,0.8)">Deploy estático</text>
  </g>

  <!-- Connecting lines between circles -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4 4">
    <line x1="109" y1="85" x2="213" y2="85"/>
    <line x1="281" y1="85" x2="385" y2="85"/>
    <line x1="453" y1="85" x2="566" y2="85"/>
    <line x1="634" y1="85" x2="747" y2="85"/>
    <line x1="815" y1="85" x2="919" y2="85"/>
    <line x1="987" y1="85" x2="1091" y2="85"/>
  </g>

</svg>
