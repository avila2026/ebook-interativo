<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b10;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0f14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1520;stop-opacity:1"/>
    </linearGradient>

    <!-- Green glow radial -->
    <radialGradient id="glowGreen" cx="30%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0"/>
    </radialGradient>

    <!-- Cyan glow radial -->
    <radialGradient id="glowCyan" cx="75%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#69f0ae"/>
      <stop offset="50%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C8FF"/>
    </linearGradient>

    <!-- Top border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00E676;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#00C8FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0"/>
    </linearGradient>

    <!-- Clip path for rounded card feel -->
    <clipPath id="clip">
      <rect width="1200" height="400" rx="0"/>
    </clipPath>

    <!-- Filter: glow on text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Filter: emoji shadow -->
    <filter id="emojiGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00E676" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" clip-path="url(#clip)"/>

  <!-- Glow overlays -->
  <rect width="1200" height="400" fill="url(#glowGreen)"/>
  <rect width="1200" height="400" fill="url(#glowCyan)"/>

  <!-- Grid lines horizontal -->
  <g stroke="rgba(0, 230, 118,0.06)" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Grid lines vertical -->
  <g stroke="rgba(0, 230, 118,0.06)" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Top neon border -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#borderGrad)"/>

  <!-- Bottom neon border -->
  <rect x="0" y="398" width="1200" height="2" fill="url(#borderGrad)"/>

  <!-- Left decorative circles -->
  <circle cx="120" cy="200" r="70" fill="none" stroke="#00E676" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="120" cy="200" r="45" fill="none" stroke="#00E676" stroke-width="0.5" stroke-opacity="0.2"/>
  <circle cx="120" cy="200" r="20" fill="rgba(0, 230, 118,0.05)" stroke="#00E676" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Right decorative circles -->
  <circle cx="1080" cy="200" r="80" fill="none" stroke="#00C8FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="1080" cy="200" r="50" fill="none" stroke="#00C8FF" stroke-width="0.5" stroke-opacity="0.2"/>
  <circle cx="1080" cy="200" r="22" fill="rgba(0, 200, 255,0.05)" stroke="#00C8FF" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Corner accents top-left -->
  <line x1="0" y1="60" x2="60" y2="0" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="0" y1="40" x2="40" y2="0" stroke="#00E676" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Corner accents top-right -->
  <line x1="1140" y1="0" x2="1200" y2="60" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="1160" y1="0" x2="1200" y2="40" stroke="#00C8FF" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Molecule dots decorative (left cluster) -->
  <circle cx="220" cy="100" r="3" fill="#00E676" fill-opacity="0.5"/>
  <circle cx="260" cy="130" r="2" fill="#00E676" fill-opacity="0.3"/>
  <circle cx="240" cy="160" r="2.5" fill="#69f0ae" fill-opacity="0.4"/>
  <line x1="220" y1="100" x2="260" y2="130" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="260" y1="130" x2="240" y2="160" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="210" cy="280" r="2" fill="#00E676" fill-opacity="0.3"/>
  <circle cx="250" cy="310" r="3" fill="#00E676" fill-opacity="0.4"/>
  <circle cx="230" cy="340" r="2" fill="#69f0ae" fill-opacity="0.3"/>
  <line x1="210" y1="280" x2="250" y2="310" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="250" y1="310" x2="230" y2="340" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Molecule dots decorative (right cluster) -->
  <circle cx="960" cy="110" r="2.5" fill="#00C8FF" fill-opacity="0.4"/>
  <circle cx="990" cy="85" r="3" fill="#00C8FF" fill-opacity="0.5"/>
  <circle cx="1020" cy="120" r="2" fill="#0891b2" fill-opacity="0.4"/>
  <line x1="960" y1="110" x2="990" y2="85" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="990" y1="85" x2="1020" y2="120" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="970" cy="290" r="3" fill="#00C8FF" fill-opacity="0.4"/>
  <circle cx="1000" cy="320" r="2" fill="#00C8FF" fill-opacity="0.3"/>
  <circle cx="980" cy="350" r="2.5" fill="#0891b2" fill-opacity="0.4"/>
  <line x1="970" y1="290" x2="1000" y2="320" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Main emoji icon -->
  <text x="600" y="165" font-size="56" text-anchor="middle" filter="url(#emojiGlow)">🛡️💉</text>

  <!-- Main title -->
  <text x="600" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800"
        text-anchor="middle" fill="url(#titleGrad)" filter="url(#textGlow)" letter-spacing="-1">
    Mounjaro sem Mitos
  </text>

  <!-- Subtitle -->
  <text x="600" y="272" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400"
        text-anchor="middle" fill="rgba(156,163,175,0.9)" letter-spacing="0.5">
    Guia Interativo da Tirzepatida · Mais segurança, menos medo
  </text>

  <!-- Divider line -->
  <rect x="480" y="288" width="240" height="1" fill="url(#borderGrad)" rx="1"/>

  <!-- Badges row -->
  <!-- PWA badge -->
  <rect x="393" y="308" width="68" height="24" rx="12" fill="rgba(0, 230, 118,0.12)" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="427" y="324" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600"
        text-anchor="middle" fill="#69f0ae" letter-spacing="0.5">PWA</text>

  <!-- Offline badge -->
  <rect x="469" y="308" width="78" height="24" rx="12" fill="rgba(0, 230, 118,0.12)" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="508" y="324" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600"
        text-anchor="middle" fill="#69f0ae" letter-spacing="0.5">OFFLINE</text>

  <!-- Supabase badge -->
  <rect x="555" y="308" width="90" height="24" rx="12" fill="rgba(0, 200, 255,0.12)" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="600" y="324" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600"
        text-anchor="middle" fill="#00C8FF" letter-spacing="0.5">SUPABASE</text>

  <!-- Interactive badge -->
  <rect x="653" y="308" width="92" height="24" rx="12" fill="rgba(0, 200, 255,0.12)" stroke="#00C8FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="699" y="324" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600"
        text-anchor="middle" fill="#00C8FF" letter-spacing="0.5">INTERATIVO</text>

  <!-- Bottom tagline -->
  <text x="600" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        text-anchor="middle" fill="rgba(107,114,128,0.8)" letter-spacing="0.3">
    Instalável · Offline · Sincronização em Nuvem · Laboratório Interativo
  </text>

</svg>
